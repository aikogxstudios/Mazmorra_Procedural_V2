schema_version: 1
last_updated: "2026-07-23"
blueprint: "BP_DungeonGenerator_V2"
type: "Blueprint Actor"

components:
  - name: "Scene"
    type: "Scene Component"
    certainty: "confirmed"

critical_invariant: "DungeonCells[Index] = DungeonCellLinks[Index] = SpawnedRooms[Index]"

functions:
  - name: "GenerateDungeon"
    status: "confirmed_temporary_refactor_flow"
    current_flow:
      - "Switch Has Authority"
      - "ResetDungeon"
      - "InitRandomStream"
      - "CreateStartCell"
      - "BuildDungeonLayout"
      - "ChooseKeyAndBossCells"
      - "SpawnStartRoom"
      - "SpawnFirstChildRoom"
    disconnected_legacy_tail:
      - "SpawnRoomsFromCells"
      - "SpawnCorridorsFromConnections"
      - "SpawnBossRoomDoors"
      - "DebugDrawDoorPoints"
      - "DebugDrawDoorToDoorConnections"

  - name: "ResetDungeon"
    status: "protected"
    responsibility: "Destroy generated actors, clear arrays and reset special indices."
    writes:
      - "SpawnedDungeonDoors"
      - "SpawnedCorridors"
      - "SpawnedRooms"
      - "DungeonCells"
      - "DungeonCellLinks"
      - "BossCellIndex"
      - "KeyCellIndex"

  - name: "CreateStartCell"
    status: "confirmed"
    produces:
      cell:
        GridX: 0
        GridY: 0
        RoomType: "Start"
        RoomID: 0
      link:
        ParentCellIndex: -1
        DirectionFromParent: "North"
        bHasParent: false

  - name: "TryAddRandomCell"
    status: "confirmed"
    child_link:
      ParentCellIndex: "Random Cell Index"
      DirectionFromParent: "Selected Direction"
      bHasParent: true
    start_guard:
      condition: "Random Cell Index == 0 AND any Selected Cell connection is true"
      result: "Return Added=false"
    validated_counts: [10, 15, 20, 50, 150]

  - name: "BuildDungeonLayout"
    status: "protected"

  - name: "SpawnStartRoom"
    status: "confirmed"
    responsibility: "Spawn, initialize and store DungeonCells[0] as SpawnedRooms[0]."
    validations:
      - "DungeonCells.IsValidIndex(0)"
      - "DungeonCells[0].RoomType == Start"
      - "SpawnActor Return Value valid"
    transform:
      location: "BP_DungeonGenerator_V2.GetActorLocation"
      rotation: [0, 0, 0]
      scale: [1, 1, 1]
    class_current_test: "BP_Room_PreBuilt_Base"
    collision_handling: "Default"
    initialization: "Init Room from Cell with DungeonCells[0], exactly once"
    array_result:
      array: "SpawnedRooms"
      index: 0

  - name: "SpawnFirstChildRoom"
    status: "corridor_offset_and_parent_aabb_confirmed"
    responsibility: "Spawn, initialize, position and validate only DungeonCells[1]."
    child_index: 1
    validations:
      - "DungeonCells.IsValidIndex(1)"
      - "DungeonCellLinks.IsValidIndex(1)"
      - "DungeonCellLinks[1].bHasParent == true"
      - "SpawnedRooms.IsValidIndex(ParentCellIndex)"
      - "Parent Room Actor valid"
      - "Child Room Actor valid"
    locals_confirmed:
      Parent_Room_Actor: "Actor Object Reference"
      Child_Room_Actor: "Actor Object Reference"
      Child_Entry_Direction: "E_DungeonDirection"
      Parent_Direction: "E_DungeonDirection"
      Parent_Door_Location: "Vector"
      Child_Door_Location: "Vector"
      Parent_Bounds_Center: "Vector"
      Parent_Bounds_Extent: "Vector"
      Child_Bounds_Center: "Vector"
      Child_Bounds_Extent: "Vector"
      bBoundsOverlap: "Boolean"
    parent_source: "SpawnedRooms[DungeonCellLinks[1].ParentCellIndex]"
    parent_direction_source: "DungeonCellLinks[1].DirectionFromParent"
    child_entry_direction: "GetOppositeDirection(DirectionFromParent)"
    child_spawn:
      temporary_location: "BP_DungeonGenerator_V2.GetActorLocation"
      collision_handling: "Always Spawn, Ignore Collisions"
      initialization: "Init Room from Cell with DungeonCells[1], exactly once"
    door_queries:
      parent: "Get Door World Location(Parent Room Actor, Parent Direction)"
      child: "Get Door World Location(Child Room Actor, Child Entry Direction)"
    corridor_offset:
      current_literal: 1000.0
      formal_corridor_length_variable: false
      desired_child_door: "Parent Door Location + GetDirectionVector(Parent Direction) * 1000"
      move_delta: "Desired Child Door - Child Door Location"
      new_location: "Child Room Actor.GetActorLocation + Move Delta"
      movement: "Set Actor Location on same Child Room Actor"
    separation_tests:
      - seed: 12345
        direction: "North"
        distance: 1000.0
        spawned_rooms_num: 2
      - seed: 12346
        direction: "East"
        distance: 1000.0
        spawned_rooms_num: 2
    bounds_queries:
      parent:
        target: "Parent Room Actor"
        center_to: "Parent Bounds Center"
        extent_to: "Parent Bounds Extent"
      child:
        target: "Child Room Actor"
        center_to: "Child Bounds Center"
        extent_to: "Child Bounds Extent"
    aabb_overlap:
      x: "Abs(ParentBoundsCenterX - ChildBoundsCenterX) <= ParentBoundsExtentX + ChildBoundsExtentX"
      y: "Abs(ParentBoundsCenterY - ChildBoundsCenterY) <= ParentBoundsExtentY + ChildBoundsExtentY"
      z: "Abs(ParentBoundsCenterZ - ChildBoundsCenterZ) <= ParentBoundsExtentZ + ChildBoundsExtentZ"
      final: "X AND Y AND Z -> Set bBoundsOverlap"
      corrected_bug:
        wrong: "Abs(Parent Center) - Child Center"
        correct: "Abs(Parent Center - Child Center)"
      tests:
        free:
          offset_literal: 1000.0
          result: false
        forced_overlap:
          offset_literal: -500.0
          result: true
    array_result:
      array: "SpawnedRooms"
      index: 1
      validated_num: 2
    preflight_next_session:
      - "Restore offset literal to 1000 after forced -500 test"

  - name: "GetOppositeDirection"
    status: "protected"
    pure: true
    mapping:
      North: "South"
      East: "West"
      South: "North"
      West: "East"

  - name: "GetDirectionVector"
    status: "confirmed"
    pure: true
    input:
      Direction: "E_DungeonDirection"
    output:
      Direction_Vector: "Vector"
    implementation: "Select indexed by Direction"
    mapping:
      North: [0, 1, 0]
      East: [1, 0, 0]
      South: [0, -1, 0]
      West: [-1, 0, 0]

  - name: "GetNeighborCoord"
    status: "protected"
    mapping:
      North: [0, 1]
      East: [1, 0]
      South: [0, -1]
      West: [-1, 0]

  - name: "IsCellOccupied"
    status: "protected"

  - name: "FindCellIndexByCoord"
    status: "protected"

  - name: "SetConnectionOnCell"
    status: "protected"

  - name: "ChooseKeyAndBossCells"
    status: "protected"

  - name: "SpawnCorridorsFromConnections"
    status: "protected"
    processed_directions: ["North", "East"]

  - name: "SpawnBossRoomDoors"
    status: "protected"

phase_f:
  status: "next"
  scope:
    child_index: 1
    compare_against: "Parent Room Actor only"
  variables_planned:
    Corridor_Length: "Float, create/confirm"
    Placement_Retry_Step: "Float, create/confirm"
    Placement_Attempt: "Integer, create/confirm"
    Max_Placement_Attempts: "Integer, create/confirm"
  flow:
    - "Calculate candidate Desired Child Door"
    - "Move same Child Room Actor"
    - "Query Child Bounds again"
    - "Calculate bBoundsOverlap"
    - "If true, increase corridor length and attempt count"
    - "Repeat until false or max attempts"
  rules:
    - "Do not SpawnActor again"
    - "Do not Init Room from Cell again"
    - "Do not regenerate HISM"
    - "Keep SpawnedRooms.Num == 2"

future_functions:
  - name: "PlaceChildRoomFromParent"
    status: "future_after_retry_prototype"
  - name: "DoesRoomOverlapPlacedRooms"
    status: "future_after_parent_only_test"
  - name: "SpawnRemainingRoomsFromParents"
    status: "future"
  - name: "ValidateDungeonData"
    status: "future_optional"

protected_mappings:
  init_room_from_cell:
    North: "SouthOpening"
    East: "WestOpening"
    South: "NorthOpening"
    West: "EastOpening"
  get_door_world_location:
    North: "Arrow_Entrance_South"
    East: "Arrow_Exit_East"
    South: "Arrow_Exit_North"
    West: "Arrow_Exit_West"
