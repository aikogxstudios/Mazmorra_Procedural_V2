spawn_start_room:
  status: "confirmed"
  function: "SpawnStartRoom"
  owner: "BP_DungeonGenerator_V2"
  inputs: []
  outputs: []
  validations:
    dungeon_cells_index_0_valid: true
    room_type_is_start: true
    spawn_return_value_validated: true
  spawn:
    class: "Start Room Class / StartDebugRoomClass"
    location_source: "BP_DungeonGenerator_V2.GetActorLocation"
    rotation: [0, 0, 0]
    scale: [1, 1, 1]
    collision_handling: "Default"
  initialization:
    interface_call: "Init Room from Cell"
    cell_data: "DungeonCells[0]"
    add_to_array: "SpawnedRooms"
    expected_index: 0
  test_results:
    compiles: true
    only_start_spawned: true
    spawned_rooms_num: 1
    spawned_rooms_0_valid: true
    start_one_opening: true
    child_rooms_spawned: false
  protected_rules:
    - "Do not use DebugRoomClass for Start"
    - "Do not set transform Scale Z to 0"
    - "Validate SpawnActor Return Value before InitRoomFromCell or Add"
    - "Call InitRoomFromCell only once"
    - "Keep Start as SpawnedRooms[0]"

