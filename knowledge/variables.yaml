    SpawnedDungeonDoors: {type: "Array Actor Reference", category: "Puertas", status: "confirmed"}
    DungeonCellLinks: {type: "Array ST_DungeonCellLink", category: "Puertas", status: "confirmed"}

  SpawnFirstChildRoom_local_variables:
    Parent_Room_Actor:
      type: "Actor Object Reference"
      status: "confirmed"
      note: "Not an array. Resolved from SpawnedRooms[ParentCellIndex]."
    Child_Room_Actor:
      type: "Actor Object Reference"
      status: "confirmed"
      note: "Not an array. Same reference is moved during placement."
    Child_Entry_Direction:
      type: "E_DungeonDirection"
      status: "confirmed"
      source: "GetOppositeDirection(DirectionFromParent)"
    Parent_Direction:
      type: "E_DungeonDirection"
      status: "confirmed"
      source: "DungeonCellLinks[1].DirectionFromParent"
    Parent_Door_Location: {type: "Vector", status: "confirmed"}
    Child_Door_Location: {type: "Vector", status: "confirmed"}
    Parent_Bounds_Center: {type: "Vector", status: "confirmed"}
    Parent_Bounds_Extent: {type: "Vector", status: "confirmed"}
    Child_Bounds_Center: {type: "Vector", status: "confirmed"}
    Child_Bounds_Extent: {type: "Vector", status: "confirmed"}
    bBoundsOverlap:
      type: "Boolean"
      status: "confirmed"
      formula: "OverlapX AND OverlapY AND OverlapZ"

  phase_f_planned_variables:
    Corridor_Length:
      type: "Float"
      status: "pending_creation_or_name_confirmation"
      note: "Current separation still uses literal 1000 in Vector * Float."
    Placement_Retry_Step:
      type: "Float"
      status: "pending_creation_or_name_confirmation"
    Placement_Attempt:
      type: "Integer"
      status: "pending_creation_or_name_confirmation"
    Max_Placement_Attempts:
      type: "Integer"
      status: "pending_creation_or_name_confirmation"

